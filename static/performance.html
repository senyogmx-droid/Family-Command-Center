<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Performance Honor Roll - Family Command Center</title>
    <link rel="stylesheet" href="/style.css?v=6">
    <link rel="stylesheet" href="/themes.css?v=6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Pacifico&family=Playfair+Display:ital,wght@0,600;1,400&display=swap');

        /* Force highly readable, simple body fonts inside performance cards */
        .card-header .points-pill,
        .summary-progress-bar,
        .card-body-scrollable,
        .summary-chore-item,
        .summary-chore-points,
        .summary-chore-name,
        .spotlight-bubble,
        .spotlight-text,
        .accolade-badge,
        .progress-text-title,
        .progress-text-sub {
            font-family: 'Inter', sans-serif !important;
            font-style: normal;
        }

        /* Increased Font Sizes for superior Kiosk readability */
        .child-name-text {
            font-size: 1.9rem !important;
        }
        .points-pill {
            font-size: 1.25rem !important;
        }
        .progress-text-title {
            font-size: 1.2rem !important;
        }
        .progress-text-sub {
            font-size: 0.95rem !important;
        }
        .summary-chore-name {
            font-size: 1.1rem !important;
            font-weight: 700 !important;
        }
        .summary-chore-points {
            font-size: 0.95rem !important;
        }
        .spotlight-text {
            font-size: 1.0rem !important;
            line-height: 1.45 !important;
        }
        .accolade-badge {
            font-size: 0.85rem !important;
            padding: 6px 12px !important;
        }

        /* High Contrast Black Text specifically for Noelle's (Princess Theme) card */
        .theme-princess,
        .theme-princess .card-header,
        .theme-princess .child-identity,
        .theme-princess .child-name-text,
        .theme-princess .points-pill,
        .theme-princess .summary-progress-bar,
        .theme-princess .progress-text-title,
        .theme-princess .progress-text-sub,
        .theme-princess .summary-chore-item,
        .theme-princess .summary-chore-name,
        .theme-princess .summary-chore-points,
        .theme-princess .spotlight-bubble,
        .theme-princess .spotlight-text,
        .theme-princess .accolade-badge,
        .theme-princess strong,
        .theme-princess span,
        .theme-princess p,
        .theme-princess div,
        .theme-princess i {
            color: #000000 !important;
            text-shadow: none !important;
        }

        .theme-princess .summary-chk-circle {
            border-color: rgba(0, 0, 0, 0.4) !important;
        }

        body {
            height: 100vh !important;
            min-height: 100vh !important;
            overflow: hidden !important;
            display: flex !important;
            flex-direction: column !important;
            padding: 0 !important;
            background: radial-gradient(circle at center, #131926 0%, #07090e 100%);
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
        }

        .performance-dashboard-container {
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto;
        }

        /* Replicating chores_summary.html header structure exactly */
        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px 30px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            flex-shrink: 0;
        }

        .summary-title h1 {
            font-family: var(--font-heading, 'Fredoka One', cursive);
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            margin: 0 0 4px 0;
        }

        .summary-title p {
            font-size: 0.95rem;
            color: var(--text-secondary, #94a3b8);
            margin: 0;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 24px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* Landscape Columns Grid Deck */
        .performance-grid-box {
            display: flex;
            gap: 24px;
            flex-grow: 1;
            align-items: stretch;
            margin-bottom: 20px;
            transition: all 0.4s ease;
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.98);
        }

        .fade-in {
            opacity: 1;
            transform: scale(1);
        }

        /* Performance cards styled to match chores_summary.html's summary-card */
        .performance-card {
            border-radius: 28px;
            padding: 26px;
            box-shadow: var(--panel-glow);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid transparent;
            min-height: 520px;
            flex: 1;
            max-width: 33.33%;
            box-sizing: border-box;
            position: relative;
        }

        .performance-card:hover {
            transform: translateY(-8px);
        }

        /* Dinosaur Theme Card Background & Colors */
        .performance-card.theme-dinosaur {
            background: linear-gradient(135deg, rgba(27, 58, 36, 0.65) 0%, rgba(10, 28, 16, 0.75) 100%);
            border-color: rgba(74, 222, 128, 0.25);
            font-family: 'Fredoka One', cursive, sans-serif;
            color: #f8fafc;
        }
        .performance-card.theme-dinosaur:hover {
            border-color: rgba(74, 222, 128, 0.55);
            box-shadow: 0 12px 40px rgba(74, 222, 128, 0.15);
        }
        .performance-card.theme-dinosaur .child-name-text {
            color: var(--accent-yellow, #ffd700);
        }
        .performance-card.theme-dinosaur .points-pill {
            background: var(--accent-yellow, #ffd700);
            color: #0c1a0e;
        }

        /* Gamer Theme Card Background & Colors */
        .performance-card.theme-gamer {
            background: linear-gradient(135deg, rgba(11, 9, 20, 0.75) 0%, rgba(3, 2, 6, 0.85) 100%);
            border-color: rgba(6, 182, 212, 0.25);
            font-family: 'Orbitron', sans-serif;
            color: #f8fafc;
        }
        .performance-card.theme-gamer:hover {
            border-color: rgba(6, 182, 212, 0.55);
            box-shadow: 0 12px 40px rgba(6, 182, 212, 0.15);
        }
        .performance-card.theme-gamer .child-name-text {
            color: var(--accent-blue, #06b6d4);
            text-shadow: 0 0 8px rgba(6, 182, 212, 0.3);
            text-transform: uppercase;
        }
        .performance-card.theme-gamer .points-pill {
            border: 2px solid var(--accent-purple, #a855f7);
            color: var(--accent-purple, #a855f7);
            background: rgba(192, 132, 252, 0.1);
        }

        /* Princess Theme Card Background & Colors */
        .performance-card.theme-princess {
            background: linear-gradient(135deg, rgba(255, 211, 232, 0.35) 0%, rgba(251, 194, 235, 0.45) 100%);
            border-color: rgba(244, 114, 182, 0.35);
            font-family: 'Playfair Display', serif;
            color: #4a1525;
        }
        .performance-card.theme-princess:hover {
            border-color: rgba(244, 114, 182, 0.65);
            box-shadow: 0 12px 40px rgba(244, 114, 182, 0.18);
        }
        .performance-card.theme-princess .child-name-text {
            color: #881337;
            font-family: 'Pacifico', cursive;
        }
        .performance-card.theme-princess .points-pill {
            background: #ff9ebb;
            color: #881337;
        }

        /* Card Header structured like chores_summary.html */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 15px;
            flex-shrink: 0;
        }
        .theme-princess .card-header {
            border-bottom-color: rgba(136, 19, 55, 0.12);
        }

        .child-identity {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-glow {
            font-size: 2.8rem;
            animation: float-avatar 3s ease-in-out infinite alternate;
        }
        @keyframes float-avatar {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-4px) scale(1.05); }
        }

        .child-name-text {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .points-pill {
            padding: 8px 14px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        /* Progress Circle Area structured like chores_summary.html */
        .summary-progress-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 18px;
            padding: 12px 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }
        .theme-princess .summary-progress-bar {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(136, 19, 55, 0.08);
        }

        .progress-circle-ring {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            transition: stroke-dashoffset 0.35s;
        }

        .progress-text-title {
            font-size: 1.05rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 2px;
        }
        .theme-princess .progress-text-title {
            color: #6d0a23;
        }
        .progress-text-sub {
            font-size: 0.85rem;
            opacity: 0.75;
            color: #fff;
        }
        .theme-princess .progress-text-sub {
            color: #881337;
        }

        /* Scrollable body */
        .card-body-scrollable {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 4px;
        }
        .card-body-scrollable::-webkit-scrollbar {
            width: 4px;
        }
        .card-body-scrollable::-webkit-scrollbar-track {
            background: transparent;
        }
        .card-body-scrollable::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }
        .theme-princess .card-body-scrollable::-webkit-scrollbar-thumb {
            background: rgba(136, 19, 55, 0.12);
        }

        /* Chores list achievements structured like chores_summary.html */
        .summary-chores-list {
            margin-bottom: 20px;
        }

        .summary-chore-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            user-select: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .theme-dinosaur .summary-chore-item {
            font-family: 'Fredoka One', cursive, sans-serif;
            background: rgba(0, 0, 0, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.03);
            color: #fff;
        }

        .theme-gamer .summary-chore-item {
            font-family: 'Orbitron', sans-serif;
            background: rgba(255, 255, 255, 0.02);
            color: #fff;
        }

        .theme-princess .summary-chore-item {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.9);
            color: #6d0a23;
        }

        /* Checked states for fully completed weekly chores */
        .summary-chore-item.completed {
            opacity: 0.6;
        }

        .summary-chk-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }
        .theme-princess .summary-chk-circle {
            border-color: rgba(136, 19, 55, 0.25);
        }

        .summary-chk-circle i {
            color: #fff;
            font-size: 0.8rem;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .summary-chore-item.completed .summary-chk-circle {
            background: #22c55e;
            border-color: #22c55e;
        }
        .theme-dinosaur .summary-chore-item.completed .summary-chk-circle {
            background: #4ade80;
            border-color: #4ade80;
        }
        .theme-gamer .summary-chore-item.completed .summary-chk-circle {
            background: #22c55e;
            border-color: #22c55e;
        }
        .theme-princess .summary-chore-item.completed .summary-chk-circle {
            background: #f472b6;
            border-color: #f472b6;
        }

        .summary-chore-item.completed .summary-chk-circle i {
            opacity: 1;
        }

        .summary-chore-item.completed .summary-chore-name {
            text-decoration: line-through;
        }

        .summary-chore-points {
            font-size: 0.85rem;
            font-weight: bold;
            opacity: 0.9;
        }

        /* Parent tribute encouragement speech bubble */
        .spotlight-bubble {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 12px 14px;
            position: relative;
            margin-bottom: 14px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .theme-princess .spotlight-bubble {
            background: rgba(255, 255, 255, 0.45);
            border-color: rgba(136, 19, 55, 0.1);
        }

        .spotlight-bubble::before {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 20px;
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.05) transparent;
            display: block;
            width: 0;
        }
        .theme-princess .spotlight-bubble::before {
            border-color: rgba(136, 19, 55, 0.1) transparent;
        }

        .spotlight-bubble::after {
            content: "";
            position: absolute;
            bottom: -7px;
            left: 21px;
            border-width: 7px 7px 0;
            border-style: solid;
            border-color: #0b0e14 transparent;
            display: block;
            width: 0;
        }
        .theme-princess .spotlight-bubble::after {
            border-color: #ffdce9 transparent;
        }

        .spotlight-text {
            font-size: 0.85rem;
            font-style: italic;
            line-height: 1.35;
            color: inherit;
            margin: 0;
        }

        /* Accolade Badges Shelf */
        .accolades-shelf {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .accolade-badge {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .theme-princess .accolade-badge {
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(136, 19, 55, 0.08);
            color: #881337;
        }

        .accolade-badge.premium {
            background: rgba(234, 179, 8, 0.08);
            border-color: rgba(234, 179, 8, 0.25);
            color: #fef08a;
            box-shadow: 0 0 8px rgba(234, 179, 8, 0.05);
        }
        .theme-princess .accolade-badge.premium {
            background: #fdf087;
            border-color: #eab308;
            color: #854d0e;
        }

        /* Slider dot pagination styles */
        .slider-dots-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            flex-shrink: 0;
        }

        .slider-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .slider-dot.active {
            background: var(--accent-blue, #06b6d4);
            box-shadow: 0 0 10px var(--accent-blue, #06b6d4);
            width: 20px;
            border-radius: 10px;
        }

        .version-telemetry-tag {
            text-align: center;
            font-size: 0.75rem;
            font-family: 'Orbitron', sans-serif;
            color: #475569;
            margin-top: 10px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="performance-dashboard-container">
        <!-- Replicated Kiosk Dashboard Header -->
        <header class="summary-header">
            <div class="summary-title">
                <h1><i class="fa-solid fa-trophy" style="color: #fbbf24;"></i> Weekly Honor Roll</h1>
                <p>Celebrating crew efforts, completion streaks, and parental spotlight accolades</p>
            </div>
            <div class="date-pill" id="performance-date-pill" style="font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: bold; border-radius: 20px; padding: 8px 16px; margin: 0 10px; background: linear-gradient(135deg, rgba(6, 182, 212, 0.15) 0%, rgba(168, 85, 247, 0.15) 100%); border: 1px solid rgba(6, 182, 212, 0.3); box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);">Last Week: Load...</div>
            <div style="display: flex; gap: 10px;">
                <a href="/child" class="nav-btn" style="background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue)); border-color: var(--accent-purple);"><i class="fa-solid fa-clipboard-list"></i> Back to Checklist</a>
                <a href="/" class="nav-btn"><i class="fa-solid fa-home"></i> Back to Kiosk</a>
            </div>
        </header>

        <!-- Landscape Column Grid Deck -->
        <div class="performance-grid-box" id="performance-grid-box">
            <div style="text-align:center; padding:50px 0; width:100%; opacity:0.6;">Loading Dynamic Weekly Honors...</div>
        </div>

        <!-- Pagination indicators -->
        <div class="slider-dots-container" id="slider-dots-box" style="display: none;">
            <!-- Dots injected dynamically -->
        </div>

        <!-- Watermark Footer -->
        <div class="version-telemetry-tag">
            Family Command Center <span id="version-number">v3.5.4</span> Blueprint
        </div>
    </div>

    <script>
        let childrenData = [];
        let currentChunkIndex = 0;
        const chunkSize = 3;
        let rotationTimer = null;
        let kioskRotatorTimeout = null;

        function getAvatarForTheme(theme) {
            switch(theme.toLowerCase()) {
                case 'dinosaur': return '🦕';
                case 'gamer': return '🎮';
                case 'princess': return '👑';
                case 'mecha': return '🤖';
                case 'roblox': return '🧱';
                case 'fortnite': return '🏆';
                case 'teen-dark': return '🕶️';
                default: return '👶';
            }
        }

        async function fetchPerformanceLogs() {
            try {
                const res = await fetch('/api/performance/last-week');
                if (res.ok) {
                    const data = await res.json();
                    
                    document.getElementById('performance-date-pill').textContent = `Last Week: ${data.date_range}`;
                    
                    // Filter children who were active/not deleted last week
                    childrenData = data.children.filter(c => c.status !== 'pending_delete');
                    
                    currentChunkIndex = 0;
                    renderSlideshow();
                    setupAutoplay();
                }
            } catch(e) {
                console.error("Error loading performance statistics:", e);
            }
        }

        function renderSlideshow() {
            const grid = document.getElementById('performance-grid-box');
            const dotsContainer = document.getElementById('slider-dots-box');
            if (!grid) return;

            grid.innerHTML = "";
            dotsContainer.innerHTML = "";
            dotsContainer.style.display = "none";

            if (childrenData.length === 0) {
                grid.innerHTML = `<div style="text-align:center; padding:50px 0; width:100%; opacity:0.6; font-style:italic;">No active crew profiles found for last week's calculations.</div>`;
                return;
            }

            // Slice child data for paginated chunks
            const start = currentChunkIndex * chunkSize;
            const end = start + chunkSize;
            const chunk = childrenData.slice(start, end);

            // Render pager dots if crew count exceeds 3
            const chunksCount = Math.ceil(childrenData.length / chunkSize);
            if (chunksCount > 1) {
                dotsContainer.style.display = "flex";
                for (let i = 0; i < chunksCount; i++) {
                    const dot = document.createElement('span');
                    dot.className = `slider-dot ${i === currentChunkIndex ? 'active' : ''}`;
                    dot.onclick = () => {
                        goToSlide(i);
                        resetAutoplay();
                    };
                    dotsContainer.appendChild(dot);
                }
            }

            chunk.forEach(child => {
                const card = document.createElement('div');
                card.className = `performance-card theme-${child.theme.toLowerCase()}`;
                
                // Add header border glow styled by theme
                const borderColors = {
                    'princess': '#f472b6',
                    'gamer': '#60a5fa',
                    'mecha': '#e75a10',
                    'fortnite': '#a855f7',
                    'roblox': '#ef4444',
                    'teen-dark': '#475569',
                    'dinosaur': '#10b981'
                };
                const borderColor = borderColors[child.theme.toLowerCase()] || '#06b6d4';

                const emojiAvatar = getAvatarForTheme(child.theme);
                
                // Circular picture layered with badge
                let avatarPath = child.profile_photo_path;
                if (!avatarPath) {
                    if (child.name.toLowerCase() === 'axel') {
                        avatarPath = 'assets/avatars/avatar_axel.png';
                    } else if (child.name.toLowerCase() === 'noelle') {
                        avatarPath = 'assets/avatars/noelle-princess.png';
                    }
                }

                let avatarHTML = "";
                if (avatarPath) {
                    const borderCol = child.theme.toLowerCase() === 'princess' ? '#a855f7' : child.theme.toLowerCase() === 'gamer' ? '#06b6d4' : '#22c55e';
                    const glowCol = child.theme.toLowerCase() === 'princess' ? 'rgba(168, 85, 247, 0.45)' : child.theme.toLowerCase() === 'gamer' ? 'rgba(6, 182, 212, 0.45)' : 'rgba(34, 197, 94, 0.45)';
                    avatarHTML = `<img src="${avatarPath}" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2.5px solid ${borderCol}; box-shadow: 0 0 12px ${glowCol}; flex-shrink: 0;">`;
                } else {
                    avatarHTML = emojiAvatar;
                }

                // Filter chores to show only those completed >= 80% (ratio >= 0.8)
                let choresHTML = "";
                const masteredChores = child.chores.filter(ch => {
                    const ratio = ch.scheduled > 0 ? (ch.completions / ch.scheduled) : 0;
                    return ratio >= 0.8;
                });

                if (masteredChores.length > 0) {
                    masteredChores.forEach(ch => {
                        const completedAll = ch.completions >= ch.scheduled && ch.scheduled > 0;
                        choresHTML += `
                            <div class="summary-chore-item ${completedAll ? 'completed' : ''}">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div class="summary-chk-circle">
                                        <i class="fa-solid fa-check"></i>
                                    </div>
                                    <span class="summary-chore-name">${ch.name}</span>
                                </div>
                                <span class="summary-chore-points">${ch.completions}/${ch.scheduled} (+${ch.points} XP)</span>
                            </div>
                        `;
                    });
                } else {
                    choresHTML = `<p style="font-style:italic; opacity:0.5; font-size:0.85rem; text-align:center; padding:15px 0; color: inherit;">Working hard on all habits! Keep pushing for that 80%+ mastery milestone! 🚀</p>`;
                }

                // Render Parent Spotlight tributes
                let spotlightHTML = "";
                if (child.spotlights && child.spotlights.length > 0) {
                    child.spotlights.forEach(sp => {
                        spotlightHTML += `
                            <div class="spotlight-bubble">
                                <p class="spotlight-text">"${sp.note}"</p>
                                <span style="font-size:0.75rem; color:#fbbf24; font-weight:bold; display:block; text-align:right; margin-top:4px;">- ${sp.giver} (+${sp.points} XP)</span>
                            </div>
                        `;
                    });
                }

                // Render system accolade badges
                let accoladesHTML = "";
                if (child.accolades && child.accolades.length > 0) {
                    child.accolades.forEach(ac => {
                        const badgeText = typeof ac === 'string' ? ac : (ac.badge || "");
                        const badgeDesc = typeof ac === 'string' ? "" : (ac.desc || "");
                        const isPremium = badgeText.includes('🏆') || badgeText.includes('👑') || badgeText.includes('⚡');
                        accoladesHTML += `
                            <div class="accolade-badge ${isPremium ? 'premium' : ''}" title="${badgeDesc}">
                                <span>${badgeText}</span>
                            </div>
                        `;
                    });
                }

                // Dynamic level up achievement display
                const levelUpHighlight = child.level > 1 ? `
                    <div style="background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(236, 72, 153, 0.15) 100%); border: 1px solid rgba(168, 85, 247, 0.35); border-radius: 12px; padding: 10px 12px; margin-bottom: 14px; font-size: 0.85rem; line-height: 1.4; color: #fdf4ff; font-family: 'Inter', sans-serif !important;">
                        <strong>🎉 Level Milestone:</strong> Reached <strong>Level ${child.level}</strong>! Showing amazing growth and responsibility!
                    </div>
                ` : '';

                // Dynamic weekly accomplishment summary text
                let summaryText = "";
                if (child.total_xp >= 40) {
                    summaryText = `🥇 <strong>Superstar Week!</strong> ${child.name} gathered a massive <strong>${child.total_xp} XP</strong> through task achievements and spotlights, proving ultimate responsibility!`;
                } else if (child.total_xp >= 20) {
                    summaryText = `🚀 <strong>Stellar Effort!</strong> ${child.name} earned <strong>${child.total_xp} XP</strong> last week and showed great consistency in daily habits!`;
                } else if (child.total_xp > 0) {
                    summaryText = `📈 <strong>Great Progress!</strong> ${child.name} gathered <strong>${child.total_xp} XP</strong> last week and is building excellent momentum!`;
                } else {
                    summaryText = `💪 <strong>Ready to Shine!</strong> ${child.name} is geared up to conquer chores and earn first XP highlights this week!`;
                }

                const summaryHTML = `
                    <div class="spotlight-bubble" style="background: rgba(255, 255, 255, 0.03); border-color: rgba(255, 255, 255, 0.08); margin-bottom: 14px; font-family: 'Inter', sans-serif !important; border-radius: 14px; padding: 12px 14px;">
                        <p class="spotlight-text" style="font-size:0.85rem; font-style:normal; line-height:1.45;">
                            ${summaryText}
                        </p>
                    </div>
                `;

                // Mathematical circular progress bar rendering matching chores_summary.html
                const pct = child.completion_percent || 0;
                const radius = 24;
                const circumference = radius * 2 * Math.PI;
                const strokeDashoffset = circumference - (pct / 100 * circumference);

                card.innerHTML = `
                    <div class="card-header">
                        <div class="child-identity">
                            <span class="avatar-glow">${avatarHTML}</span>
                            <div>
                                <span class="child-name-text">${child.name}</span>
                                <div style="font-size: 0.75rem; opacity: 0.7; margin-top: 2px;">Level ${child.level || 1} Crew</div>
                            </div>
                        </div>
                        <div class="points-pill">+${child.total_xp || 0} XP</div>
                    </div>

                    <div class="summary-progress-bar">
                        <svg width="60" height="60">
                            <circle stroke="rgba(255,255,255,0.06)" stroke-width="6" fill="transparent" r="24" cx="30" cy="30"/>
                            <circle class="progress-circle-ring" stroke="${borderColor}" stroke-width="6" fill="transparent" r="24" cx="30" cy="30" stroke-dasharray="${circumference}" stroke-dashoffset="${strokeDashoffset}"/>
                        </svg>
                        <div>
                            <div class="progress-text-title">${pct}% Completed</div>
                            <div class="progress-text-sub">${child.completion_ratio} Chores Mastered</div>
                        </div>
                    </div>

                    <div class="card-body-scrollable">
                        ${levelUpHighlight}
                        ${summaryHTML}

                        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; opacity: 0.7; margin-bottom: 8px; flex-shrink:0;">
                            📋 Mastered Habits (80%+)
                        </div>
                        <div class="summary-chores-list">
                            ${choresHTML}
                        </div>

                        ${spotlightHTML ? `
                            <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; opacity: 0.7; margin-bottom: 8px; flex-shrink:0;">
                                ✨ Parental Spotlight
                            </div>
                            ${spotlightHTML}
                        ` : ''}

                        ${accoladesHTML ? `
                            <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; opacity: 0.7; margin-bottom: 8px; flex-shrink:0;">
                                🏆 Accolades Shelf
                            </div>
                            <div class="accolades-shelf">
                                ${accoladesHTML}
                            </div>
                        ` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function goToSlide(index) {
            const grid = document.getElementById('performance-grid-box');
            if (grid) {
                grid.classList.add('fade-out');
                setTimeout(() => {
                    currentChunkIndex = index;
                    renderSlideshow();
                    grid.classList.remove('fade-out');
                    grid.classList.add('fade-in');
                }, 400);
            }
        }

        function setupAutoplay() {
            clearInterval(rotationTimer);
            const chunksCount = Math.ceil(childrenData.length / chunkSize);
            if (chunksCount <= 1) return;

            rotationTimer = setInterval(() => {
                const nextIndex = (currentChunkIndex + 1) % chunksCount;
                goToSlide(nextIndex);
            }, 15000); // cycle sub-slide every 15 seconds
        }

        function resetAutoplay() {
            clearInterval(rotationTimer);
            setupAutoplay();
        }

        /* -------------------------------------------------------------
           INACTIVITY CAROUSEL ROTATION - ROTATE BACK TO / AFTER 90s
        ------------------------------------------------------------- */
        function initKioskRotator() {
            const rotationTime = 90000; // 90 seconds
            clearTimeout(kioskRotatorTimeout);
            kioskRotatorTimeout = setTimeout(rotateToMainDashboard, rotationTime);

            function rotateToMainDashboard() {
                console.log("[Kiosk] Weekly performance slide inactivity. Rotating to home page...");
                window.location.href = '/';
            }

            function resetKioskTimer() {
                clearTimeout(kioskRotatorTimeout);
                kioskRotatorTimeout = setTimeout(rotateToMainDashboard, rotationTime);
            }

            // Listen for user interactions to prevent interruptive rotation
            const events = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'];
            events.forEach(name => {
                document.addEventListener(name, resetKioskTimer, { passive: true });
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchPerformanceLogs();
            initKioskRotator();

            // Set up real-time SSE listener to reload performance if modified
            const evtSource = new EventSource("/api/events");
            evtSource.addEventListener("chore_update", (e) => {
                fetchPerformanceLogs();
            });
            evtSource.addEventListener("admin_config_change", (e) => {
                fetchPerformanceLogs();
            });

            // Fetch version dynamically from server
            fetch('/api/version')
                .then(res => res.json())
                .then(data => {
                    const el = document.getElementById('version-number');
                    if (el) el.textContent = data.version;
                })
                .catch(err => console.warn("Could not fetch version", err));
        });
    </script>
</body>
</html>
